<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thi Trắc Nghiệm - Đăng nhập</title>

    <style>
        /* Reset CSS cơ bản để giao diện đồng nhất trên mọi trình duyệt */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Thiết lập nền cho toàn bộ trang web */
        body {
            background-color: #f3f4f6; /* Màu xám nhạt hiện đại */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Chiều cao bằng 100% màn hình */
        }

        /* Hộp chứa form đăng nhập/đăng ký (Card) */
        .auth-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 12px; /* Bo góc mềm mại */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); /* Hiệu ứng đổ bóng nổi bật */
        }

        /* Tiêu đề của form */
        .auth-container h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* Nhóm các ô nhập liệu */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4b5563;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Hiệu ứng khi bấm vào ô nhập liệu */
        .form-group input:focus {
            border-color: #3b82f6; /* Đổi viền sang màu xanh */
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Nút xác nhận chung (Đăng nhập / Đăng ký) */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6; /* Xanh dương đậm */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2563eb; /* Tối màu lại khi di chuột vào */
        }

        /* Nút đăng nhập Google */
        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #4b5563;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Khoảng cách giữa logo và chữ */
        }

        .btn-google:hover {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }

        /* Dòng chữ "HOẶC" có 2 gạch ngang */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        /* Phần chuyển đổi giữa Đăng nhập và Đăng ký */
        .toggle-form {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
        }

        .toggle-form span {
            color: #3b82f6;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .toggle-form span:hover {
            text-decoration: underline;
        }

        /* Lớp CSS dùng để ẩn form (Khi muốn ẩn Form Đăng ký đi) */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div id="login-form">
            <h2>Đăng Nhập Hệ Thống</h2>
            
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Nhập địa chỉ email của bạn" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Mật khẩu</label>
                <input type="password" id="login-password" placeholder="Nhập mật khẩu" required>
            </div>
            
            <button id="btn-login" class="btn-submit">Đăng Nhập</button>
            
            <div class="divider">HOẶC</div>
            
            <button id="btn-google" class="btn-google">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Đăng nhập bằng Google
            </button>

            <div class="toggle-form">
                Chưa có tài khoản? <span id="go-to-register">Đăng ký ngay</span>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <h2>Tạo Tài Khoản Mới</h2>
            
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" placeholder="Nhập địa chỉ email hợp lệ" required>
            </div>
            
            <div class="form-group">
                <label for="register-password">Mật khẩu</label>
                <input type="password" id="register-password" placeholder="Tạo mật khẩu (Ít nhất 6 ký tự)" required>
            </div>
            
            <button id="btn-register" class="btn-submit">Đăng Ký</button>
            
            <div class="toggle-form">
                Đã có tài khoản? <span id="go-to-login">Quay lại đăng nhập</span>
            </div>
        </div>

    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const goToRegisterBtn = document.getElementById('go-to-register');
        const goToLoginBtn = document.getElementById('go-to-login');

        goToRegisterBtn.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
        });

        goToLoginBtn.addEventListener('click', () => {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        // Import thêm GoogleAuthProvider và signInWithPopup
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CẤU HÌNH FIREBASE CỦA BẠN (ĐÃ ĐIỀN)
        let firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        // (Đoạn mã hỗ trợ chạy thử nghiệm - Preview ngay trên hệ thống AI)
        if (typeof __firebase_config !== 'undefined') {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch (e) {
                console.warn("Lỗi đọc cấu hình môi trường giả lập.");
            }
        }

        let app, auth;

        // Chỉ khởi tạo Firebase và Authentication khi biến apiKey đã có dữ liệu
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "") {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
        }

        // -- XỬ LÝ ĐĂNG KÝ TÀI KHOẢN (BẰNG EMAIL) --
        const btnRegister = document.getElementById('btn-register');
        btnRegister.addEventListener('click', () => {
            if (!auth) {
                alert("Bạn chưa cấu hình Firebase!");
                return;
            }

            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            if(!email || !password) {
                alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Đăng ký thành công! Mời bạn đăng nhập.");
                    document.getElementById('go-to-login').click();
                    document.getElementById('register-email').value = "";
                    document.getElementById('register-password').value = "";
                })
                .catch((error) => {
                    const errorCode = error.code;
                    if (errorCode === 'auth/email-already-in-use') {
                        alert("Lỗi: Email này đã được đăng ký từ trước!");
                    } else if (errorCode === 'auth/weak-password') {
                        alert("Lỗi: Mật khẩu quá ngắn, vui lòng nhập ít nhất 6 ký tự!");
                    } else if (errorCode === 'auth/invalid-email') {
                        alert("Lỗi: Định dạng email không hợp lệ!");
                    } else {
                        alert("Lỗi hệ thống: " + error.message);
                    }
                });
        });

        // -- XỬ LÝ ĐĂNG NHẬP (BẰNG EMAIL) --
        const btnLogin = document.getElementById('btn-login');
        btnLogin.addEventListener('click', () => {
            if (!auth) {
                alert("Bạn chưa cấu hình Firebase!");
                return;
            }

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if(!email || !password) {
                alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Đăng nhập thành công! Đang chuyển vào phòng chờ...");
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    const errorCode = error.code;
                    if (errorCode === 'auth/invalid-credential' || errorCode === 'auth/user-not-found' || errorCode === 'auth/wrong-password') {
                        alert("Lỗi: Sai email hoặc mật khẩu. Vui lòng kiểm tra lại!");
                    } else {
                        alert("Lỗi đăng nhập: " + error.message);
                    }
                });
        });

        // -- XỬ LÝ ĐĂNG NHẬP BẰNG GOOGLE (MỚI THÊM) --
        const btnGoogle = document.getElementById('btn-google');
        btnGoogle.addEventListener('click', () => {
            if (!auth) {
                alert("Bạn chưa cấu hình Firebase!");
                return;
            }

            // Khởi tạo Provider của Google
            const provider = new GoogleAuthProvider();

            // Gọi Popup Đăng nhập
            signInWithPopup(auth, provider)
                .then((result) => {
                    alert("Đăng nhập thành công! Đang chuyển vào phòng chờ...");
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    const errorCode = error.code;
                    // Bắt lỗi nếu người dùng bấm dấu X tắt cửa sổ Google đi
                    if (errorCode === 'auth/popup-closed-by-user') {
                        alert("Lỗi: Bạn đã đóng cửa sổ đăng nhập trước khi hoàn tất!");
                    } else {
                        alert("Lỗi đăng nhập Google: " + error.message);
                    }
                });
        });
    </script>
</body>
</html>
